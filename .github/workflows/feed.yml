name: Static Feed Builder

on:
  workflow_dispatch:
  schedule:
    # UTC time. Around 08:17 and 20:43 in Asia/Shanghai/Asia/Bangkok.
    - cron: "17 1 * * *"
    - cron: "43 13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore extraction cache
        uses: actions/cache@v4
        with:
          path: data/llm_cache.json
          key: extraction-cache-${{ github.run_id }}
          restore-keys: |
            extraction-cache-

      - name: Crawl and export
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python -m feed_builder.cli init-db
          python -m feed_builder.cli crawl --llm-clean
          python -m feed_builder.cli digest --push
          python -m feed_builder.cli export-site --days 90 --limit 100

      - name: Check Pages settings
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          code=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages")
          if [ "$code" = "404" ]; then
            echo "::error::GitHub Pages is not enabled yet. Open Settings -> Pages -> Build and deployment -> Source -> GitHub Actions, then rerun this workflow."
            exit 1
          fi
          cat /tmp/pages.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

